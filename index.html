<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Theater Reservation</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex flex-col items-center p-6">

<h1 class="text-3xl font-bold mb-6">🎭 Teatro Don Bosco</h1>

<!-- APP -->
<div id="app">
  <h2 class="text-xl mb-4">Select your seat</h2>

  <div id="seats" class="grid grid-cols-10 gap-2 mb-6"></div>

  <button onclick="confirmBooking()" 
    class="bg-purple-600 px-6 py-2 rounded">
    Confirm Booking ($10)
  </button>

  <div id="ticket" class="mt-6"></div>
</div>

<script type="module">
import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 ADD YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedSeat = null;

const seatsDiv = document.getElementById("seats");

/* 🎟️ Render Seats */
async function renderSeats() {
  seatsDiv.innerHTML = "";

  for (let i = 1; i <= 50; i++) {
    const seatRef = doc(db, "seats", String(i));
    const seatSnap = await getDoc(seatRef);

    const seat = document.createElement("div");
    seat.innerText = i;
    seat.className = "p-3 text-center rounded cursor-pointer";

    if (seatSnap.exists()) {
      // Taken seat
      seat.classList.add("bg-red-500", "cursor-not-allowed");
    } else {
      // Available seat
      seat.classList.add("bg-gray-400");

      seat.onclick = () => {
        selectedSeat = i;
        renderSeats();
      };
    }

    if (selectedSeat === i) {
      seat.className = "p-3 text-center rounded bg-green-500";
    }

    seatsDiv.appendChild(seat);
  }
}

renderSeats();

/* 💳 Booking */
window.confirmBooking = async () => {
  if (!selectedSeat) {
    alert("Please select a seat first!");
    return;
  }

  const seatRef = doc(db, "seats", String(selectedSeat));

  try {
    const seatSnap = await getDoc(seatRef);

    if (seatSnap.exists()) {
      alert("❌ Seat already taken!");
      renderSeats();
      return;
    }

    // Save booking
    await setDoc(seatRef, {
      seat: selectedSeat,
      bookedAt: new Date()
    });

    alert("✅ Booking confirmed!");

    document.getElementById("ticket").innerHTML = `
      🎟️ <h3 class="text-xl font-bold">Your Ticket</h3>
      Seat: ${selectedSeat}
    `;

    selectedSeat = null;
    renderSeats();

  } catch (err) {
    console.error(err);
    alert("Something went wrong.");
  }
};
</script>

</body>
</html>

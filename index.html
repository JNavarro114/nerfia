<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cinema Seat Booking</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex flex-col items-center p-6">

<h1 class="text-3xl font-bold mb-2">🎬 Cinema Booking</h1>
<p class="mb-6 text-gray-400">Select your seats</p>

<!-- SCREEN -->
<div class="w-80 h-6 bg-gray-300 text-black text-center mb-6 rounded">
  SCREEN
</div>

<!-- SEATS -->
<div id="seats" class="space-y-2"></div>

<!-- LEGEND -->
<div class="flex gap-4 mt-6 text-sm">
  <div class="flex items-center gap-2">
    <div class="w-4 h-4 bg-gray-400"></div> Available
  </div>
  <div class="flex items-center gap-2">
    <div class="w-4 h-4 bg-green-500"></div> Selected
  </div>
  <div class="flex items-center gap-2">
    <div class="w-4 h-4 bg-red-500"></div> Taken
  </div>
</div>

<!-- BUTTON -->
<button onclick="confirmBooking()" 
class="mt-6 bg-purple-600 px-6 py-2 rounded">
Confirm Booking
</button>

<div id="ticket" class="mt-6"></div>

<script type="module">

/* 🔥 OPTIONAL FIREBASE */
let db = null;

try {
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
  const { getFirestore, doc, setDoc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");

  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_ID"
  };

  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);

} catch (err) {
  console.warn("⚠️ Firebase not connected → running offline mode");
}

/* 🎟️ CONFIG */
const rows = ["A","B","C","D","E"];
const cols = 10;

let selectedSeats = [];

/* 🎨 Render Seats */
async function renderSeats() {
  const container = document.getElementById("seats");
  container.innerHTML = "";

  for (let row of rows) {
    const rowDiv = document.createElement("div");
    rowDiv.className = "flex gap-2 justify-center";

    for (let i = 1; i <= cols; i++) {
      const seatId = row + i;

      let taken = false;

      if (db) {
        try {
          const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
          const snap = await getDoc(doc(db, "seats", seatId));
          taken = snap.exists();
        } catch (e) {
          console.log("Firestore error", e);
        }
      }

      const seat = document.createElement("div");
      seat.innerText = i;
      seat.className = "w-8 h-8 flex items-center justify-center text-xs rounded cursor-pointer";

      if (taken) {
        seat.classList.add("bg-red-500", "cursor-not-allowed");
      } else if (selectedSeats.includes(seatId)) {
        seat.classList.add("bg-green-500");
      } else {
        seat.classList.add("bg-gray-400");

        seat.onclick = () => {
          if (selectedSeats.includes(seatId)) {
            selectedSeats = selectedSeats.filter(s => s !== seatId);
          } else {
            selectedSeats.push(seatId);
          }
          renderSeats();
        };
      }

      rowDiv.appendChild(seat);
    }

    container.appendChild(rowDiv);
  }
}

renderSeats();

/* 💳 Booking */
window.confirmBooking = async () => {
  if (selectedSeats.length === 0) {
    alert("Select at least one seat");
    return;
  }

  if (!db) {
    alert("⚠️ Firebase not connected (demo mode)");
    return;
  }

  try {
    const { doc, setDoc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");

    for (let seatId of selectedSeats) {
      const ref = doc(db, "seats", seatId);
      const snap = await getDoc(ref);

      if (snap.exists()) {
        alert("Seat " + seatId + " already taken!");
        renderSeats();
        return;
      }

      await setDoc(ref, {
        seat: seatId,
        bookedAt: new Date()
      });
    }

    document.getElementById("ticket").innerHTML = `
      🎟️ <h3 class="text-xl font-bold">Your Seats</h3>
      ${selectedSeats.join(", ")}
    `;

    alert("✅ Booking successful!");

    selectedSeats = [];
    renderSeats();

  } catch (err) {
    console.error(err);
    alert("Error booking seats");
  }
};

</script>

</body>
</html>
